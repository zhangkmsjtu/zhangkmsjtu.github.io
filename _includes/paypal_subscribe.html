<script>
  (function() {
    function init() {
      var selector = '#paypal-button-container-P-0YE321311R9328900NGIRUJA';
      var container = document.querySelector(selector);
      if (!container || !window.paypal) return;
      window.paypal.Buttons({
          style: {
              layout: 'horizontal',
              size: 'small',
              label: 'pay',
              color: 'gold',
              shape: 'rect',
              height: 35,
              tagline: false
          },
        createSubscription: function(data, actions) {
          return actions.subscription.create({ plan_id: 'P-0YE321311R9328900NGIRUJA' });
        },
        onApprove: function(data) { alert(data.subscriptionID); }
      }).render(selector);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
