<script src="https://www.paypal.com/sdk/js?client-id=AR8DQJJaXXGCchTzP-2fLYEtLoefjwsbKhxM-8hp3szcyerSvNIgnSk24StyxlaK5taLOZIfs8uy6Aib&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>
<script>
  (function() {
    function init() {
      var selector = '#paypal-button-container-P-0YE321311R9328900NGIRUJA';
      var container = document.querySelector(selector);
      if (!container || !window.paypal) return;
      window.paypal.Buttons({
        style: { shape: 'rect', color: 'gold', layout: 'vertical', label: 'subscribe' },
        createSubscription: function(data, actions) {
          return actions.subscription.create({ plan_id: 'P-0YE321311R9328900NGIRUJA' });
        },
        onApprove: function(data) { alert(data.subscriptionID); }
      }).render(selector);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
